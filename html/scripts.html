<script>
function cargarProductos(){
google.script.run.withSuccessHandler(function(r){
const tb=document.querySelector('#tabla tbody');tb.innerHTML='';
r.forEach(x=>tb.innerHTML+=`<tr><td>${x[0]}</td><td>${x[1]}</td><td>${x[2]}</td><td>${x[3]}</td><td>${x[4]}</td></tr>`);
}).obtenerProductos();
}
function cargarMateriales(){
google.script.run.withSuccessHandler(function(r){
const tb=document.querySelector('#tablaMateriales tbody');tb.innerHTML='';
r.forEach(x=>tb.innerHTML+=`<tr><td>${x[0]}</td><td>${x[1]}</td><td>${x[2]}</td><td>${x[3]}</td><td>${x[4]}</td></tr>`);
}).obtenerMateriales();
}
function filtrarProductos(){
const t=document.getElementById('buscar').value.toLowerCase();
document.querySelectorAll('#tabla tbody tr').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(t)?'':'none');
}
</script>
